<div class="task-details" (click)="details(task.id)">

  <div *ngIf="task.priority == 1" class="line-priority-low"></div>
  <div *ngIf="task.priority == 2" class="line-priority-medium"></div>
  <div *ngIf="task.priority == 3" class="line-priority-high"></div>

  <div>
    <!-- <h1 *ngIf="task.priority == 1" class="task-title-low">{{task.title}}</h1> -->
    <h1 *ngIf="task.priority == 1" class="task-title-low">{{task.datetime | date : "shortTime"}}</h1>
    <h1 *ngIf="task.priority == 2" class="task-title-medium">{{task.datetime | date : "shortTime"}}</h1>
    <h1 *ngIf="task.priority == 3" class="task-title-high">{{task.datetime | date : "shortTime"}}</h1>

    <div class="status">
      <h1 *ngIf="task.status == 1" class="status-text-pending">{{ 'HOME.PENDING' | translate }}</h1>
      <h1 *ngIf="task.status == 2" class="status-text-completed">{{ 'HOME.FINISH' | translate }}</h1>
    </div>
  </div>

  <div>
    <h1 class="task-title">{{task.title}}</h1>
    <h1 class="task-subtitle">{{task.description}}</h1>
  </div>
</div>
